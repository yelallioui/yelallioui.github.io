# =============================================================================
# _config.yml CORRIGÉ — Pr. Youssouf EL ALLIOUI
# BUG CORRIGÉ : avatar "images/profile.jpg" → "profile.jpg"
# =============================================================================

locale          : "fr-FR"
title           : "Pr. Youssouf EL ALLIOUI"
title_separator : "–"
name            : "Youssouf EL ALLIOUI"
description     : >-
  Professeur-Chercheur en Informatique à l'Université Sultan Moulay Slimane (USMS),
  Maroc. Machine Learning · Semantic Web · Educational Data Mining (EDM) · IA.
url             : "https://yelallioui.github.io"
baseurl         : ""
repository      : "yelallioui/yelallioui.github.io"
teaser          :
breadcrumbs     : true
words_per_minute: 160
future          : true
read_more       : "enabled"
talkmap_link    : false

comments:
  provider      : false
  disqus:
    shortname   :
  staticman:
    allowedFields : ['name', 'email', 'url', 'message']
    branch        : "master"
    commitMessage : "New comment."
    filename      : comment-{@timestamp}
    format        : "yml"
    moderation    : true
    path          : "_data/comments/{options.slug}"
    requiredFields: ['name', 'email', 'message']
    transforms:
      email       : "md5"
    generatedFields:
      date:
        type      : "date"
        options:
          format  : "iso8601"
atom_feed:
  path          :

google_site_verification  :
bing_site_verification    :
yandex_site_verification  :

twitter:
  username      :
facebook:
  username      : "yelallioui"
  app_id        :
  publisher     :
og_image        : "images/profile.jpg"

social:
  type          : "Person"
  name          : "Youssouf EL ALLIOUI"
  links:
    - "https://scholar.google.com/citations?hl=en&user=OeiqzH0AAAAJ"
    - "https://www.researchgate.net/profile/Youssouf_El_Allioui"
    - "https://orcid.org/0000-0001-7176-7434"
    - "https://www.linkedin.com/in/yelallioui"
    - "https://github.com/yelallioui"

analytics:
  provider      : "google-universal"
  google:
    tracking_id :

# ─────────────────────────────────────────────────────────────────────────────
# PROFIL AUTEUR
# ✅ CORRECTIF : avatar = "profile.jpg"  (PAS "images/profile.jpg")
#    Le thème ajoute /images/ automatiquement → /images/profile.jpg
#    Mettre "images/profile.jpg" donnait → /images/images/profile.jpg  ❌
# ─────────────────────────────────────────────────────────────────────────────
author:
  name          : "Pr. Youssouf EL ALLIOUI"
  avatar        : "profile.jpg"
  bio           : >-
    Professeur-Chercheur en Informatique.
    PhD (2012) — Université Sidi Mohamed Ben Abdellah, Fès.
    Machine Learning · Semantic Web · EDM · IA & Éducation.
  location      : "Khouribga, Maroc"
  employer      : "Université Sultan Moulay Slimane (USMS)"
  googlescholar : "https://scholar.google.com/citations?hl=en&user=OeiqzH0AAAAJ"
  orcid         : "https://orcid.org/0000-0001-7176-7434"
  researchgate  : "https://www.researchgate.net/profile/Youssouf_El_Allioui"
  impactstory   :
  pubmed        :
  email         : "y.elallioui@usms.ma"
  uri           : "http://www.usms.ac.ma/website/"
  linkedin      : "yelallioui"
  github        : "yelallioui"
  facebook      : "yelallioui"
  twitter       :
  youtube       :
  instagram     :
  stackoverflow :

include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gemfile.lock
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - package-lock.json
  - tmp
  - vendor
  - markdown_generator

keep_files:
  - .git
  - .svn

encoding         : "utf-8"
markdown_ext     : "markdown,mkdown,mkdn,mkd,md"

markdown    : kramdown
highlighter : rouge
lsi         : false
excerpt_separator: "\n\n"
incremental : false

kramdown:
  input          : GFM
  hard_wrap      : false
  auto_ids       : true
  footnote_nr    : 1
  entity_output  : as_char
  toc_levels     : 1..6
  smart_quotes   : lsquo,rsquo,ldquo,rdquo
  enable_coderay : false

collections:
  teaching:
    output    : true
    permalink : /:collection/:path/
  publications:
    output    : true
    permalink : /:collection/:path/
  portfolio:
    output    : true
    permalink : /:collection/:path/
  talks:
    output    : true
    permalink : /:collection/:path/

defaults:
  - scope:
      path : ""
      type : posts
    values:
      layout        : single
      author_profile: true
      read_time     : true
      comments      : false
      share         : true
      related       : true
  - scope:
      path : ""
      type : pages
    values:
      layout        : single
      author_profile: true
  - scope:
      path : ""
      type : teaching
    values:
      layout        : single
      author_profile: true
      share         : true
      comments      : false
  - scope:
      path : ""
      type : publications
    values:
      layout        : single
      author_profile: true
      share         : true
      comments      : false
  - scope:
      path : ""
      type : portfolio
    values:
      layout        : single
      author_profile: true
      share         : true
      comments      : false
  - scope:
      path : ""
      type : talks
    values:
      layout        : talk
      author_profile: true
      share         : true

sass:
  sass_dir : _sass
  style    : compressed

permalink  : /:categories/:title/
timezone   : "Africa/Casablanca"

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
  - jemoji

category_archive:
  type : liquid
  path : /categories/

tag_archive:
  type : liquid
  path : /tags/

compress_html:
  clippings : all
  ignore:
    envs    : development
