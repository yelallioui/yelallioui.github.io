  <script>
    function renderCards(data) {
      const container = document.getElementById('cards');
      if (!data || data.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <span style="font-size:2rem;">🔬</span>
            <p>Aucun TP disponible pour le moment.</p>
          </div>`;
        return;
      }
      container.innerHTML = data.map(item => `
        <div class="card observe">
          <div class="card-meta">
            <h4>${item.numero} — ${item.titre}</h4>
            <span class="tag">${item.niveau}</span>
          </div>
          <p class="card-sub">${item.module} &nbsp;·&nbsp; ${item.filiere}</p>
          <p style="font-size:.9rem;">${item.description}</p>
          <div class="card-actions">
            <span class="mono" style="font-size:.78rem; color:var(--text-dim);">📅 ${item.annee}</span>
            <div style="display:flex; gap:.5rem; flex-wrap:wrap;">
              ${item.pdf
                ? `<a href="${item.pdf}" class="btn btn-outline" target="_blank">📄 Énoncé</a>`
                : ''
              }
              ${item.corrige
                ? `<a href="${item.corrige}" class="btn btn-outline" target="_blank">✅ Corrigé</a>`
                : ''
              }
              ${!item.pdf && !item.corrige
                ? `<span style="color:var(--text-dim); font-size:.78rem; font-family:var(--font-mono);">Bientôt disponible</span>`
                : ''
              }
            </div>
          </div>
        </div>
      `).join('');
    }
    renderCards(DATA);
  </script>
