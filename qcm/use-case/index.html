<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QCM — Use Case Diagram UML</title>
  <link rel="stylesheet" href="../../styles.css" />
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="../../images/profile.png" />
</head>
<body>

  <!-- Navigation globale -->
  <header>
    <nav class="nav">
      <div class="container nav-inner">
        <a href="../../index.html" class="nav-brand">Pr. EL ALLIOUI</a>
        <ul class="nav-links">
          <li><a href="../../index.html">About</a></li>
          <li><a href="../../enseignement/index.html">Enseignement</a></li>
          <li><a href="../../recherche/index.html">Recherche</a></li>
          <li><a href="../../cv/index.html">CV</a></li>
          <li><a href="../index.html" class="active">QCM</a></li>
          <li><a href="../../contact/index.html">Contact</a></li>
        </ul>
        <button class="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
      </div>
      <nav class="nav-mobile">
        <a href="../../index.html">About</a>
        <a href="../../enseignement/index.html">Enseignement</a>
        <a href="../../recherche/index.html">Recherche</a>
        <a href="../../cv/index.html">CV</a>
        <a href="../index.html" class="active">QCM</a>
        <a href="../../contact/index.html">Contact</a>
      </nav>
    </nav>
  </header>

  <!-- Indicateur de progression -->
  <div class="progress-container" role="status" aria-live="polite">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText">Question 1 / 30</div>
  </div>

  <!-- Conteneur principal de la question -->
  <main class="quiz-container" id="quizContainer">
    <div class="question-card">
      <h2 class="question-title" id="questionTitle">Chargement...</h2>
      <div class="choices-container" id="choicesContainer" role="radiogroup" aria-label="Options de réponse"></div>
    </div>
  </main>

  <!-- Panneau d'explication -->
  <div class="explanation-panel" id="explanationPanel" role="region" aria-live="assertive">
    <div class="explanation-content" id="explanationContent"></div>
  </div>

  <!-- Boutons de navigation -->
  <div class="navigation-buttons">
    <button class="nav-button nav-prev" id="prevButton" aria-label="Question précédente" title="Question précédente (Flèche gauche)">
      <span class="nav-icon">←</span>
      <span class="nav-text">Précédent</span>
    </button>
    <button class="nav-button nav-next" id="nextButton" aria-label="Question suivante" title="Question suivante (Flèche droite)">
      <span class="nav-text">Suivant</span>
      <span class="nav-icon">→</span>
    </button>
  </div>

  <!-- Indicateur de réponse -->
  <div class="answer-indicator" id="answerIndicator" aria-hidden="true"></div>

  <script src="script.js"></script>
  <script src="../../script.js"></script>
</body>
</html>
