  <script>
    document.getElementById('cards').innerHTML =
      '<div class="cards-grid">' +
      DATA.map(function(c,i){
        return '<div class="card observe" style="animation-delay:'+(i*.08)+'s'+(!c.disponible?'; opacity:.65;':'')+'">' +
          '<div class="card-meta"><h3>'+c.icon+' '+c.titre+'</h3>' +
          (c.disponible?'<span class="tag" style="color:var(--green);border-color:var(--green);">Disponible</span>':'<span class="tag">Bientôt</span>') +
          '</div><p style="font-size:.9rem;color:var(--text-dim);margin:.75rem 0 1.25rem;">'+c.description+'</p>' +
          '<div class="card-actions">' +
          (c.nb_questions?'<span class="tag">'+c.nb_questions+' questions</span>':'<span></span>') +
          (c.disponible?'<a href="'+c.lien+'" class="btn btn-primary">Démarrer →</a>':'<button class="btn btn-outline" disabled style="opacity:.5;cursor:not-allowed;">Bientôt disponible</button>') +
          '</div></div>';
      }).join('')+'</div>';
